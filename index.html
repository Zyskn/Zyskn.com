    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --accent: #000;
            --gray-bg: #F5F5F5;
            --text-muted: #666666;
            --blue: #3B82F6;
            --blue-hover: #2563EB;
            --red: #EF4444;
            --red-hover: #DC2626;
            --whatsapp: #25D366;
            --instagram: #E4405F;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --container-max: 1400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #fff;
            color: #000;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
            padding: 24px 0;
            transition: var(--transition);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        .logo-slogan {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .nav-main {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-link {
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            opacity: 0.42;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            opacity: 1;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
        }

        .icon-btn svg { width: 20px; height: 20px; stroke-width: 2; }

        .search-btn { color: var(--blue); }
        .search-btn:hover { color: var(--blue-hover); transform: scale(1.05); }

        .auth-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            transition: var(--transition);
        }

        .auth-text:hover { color: var(--text-muted); }

        .cart-btn { color: var(--red); }
        .cart-btn:hover { color: var(--red-hover); transform: scale(1.05); }

        .cart-badge {
            position: absolute;
            top: -6px; right: -8px;
            background: #000;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sub-navigation con Slide Rápido */
        .sub-nav-wrapper {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Slide más rápido */
            background: #fff;
            text-align: center;
        }

        .sub-nav-wrapper.show {
            max-height: 150px;
            margin-bottom: 40px;
        }

        .sub-nav {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            padding: 30px 0;
            transform: translateY(-10px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .sub-nav.show {
            display: flex;
            transform: translateY(0);
            opacity: 1;
        }

        /* Hero */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            margin-bottom: 80px;
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-btn-wrap {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            border: none;
            height: 52px;
            padding: 0 40px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            background: var(--red-hover);
            transform: scale(0.98);
        }

        /* Shop Grid */
        .section-padding { padding: 80px 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .product-card {
            cursor: pointer;
            position: relative;
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-img-wrap {
            position: relative;
            background: var(--gray-bg);
            aspect-ratio: 3/4;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover .product-img { transform: scale(1.03); }

        .quick-add {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            color: #fff;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
        }

        .product-card:hover .quick-add { opacity: 1; }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .product-price { font-size: 14px; font-weight: 400; color: #000; }

        /* Footer */
        footer {
            background: #fff;
            border-top: 1px solid #f0f0f0;
            padding: 100px 0 40px;
            position: relative;
        }

        .footer-paper-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/paper.png');
            opacity: 0.02;
            pointer-events: none;
        }

        .contact-section { text-align: center; margin-bottom: 80px; }
        .contact-title { font-size: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 48px; }

        .social-links { display: flex; justify-content: center; gap: 60px; }
        .social-item { display: flex; flex-direction: column; align-items: center; gap: 16px; text-decoration: none; color: #000; }

        .social-circle {
            width: 60px; height: 60px;
            background: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }

        .social-circle svg { width: 24px; height: 24px; fill: #fff; }
        .social-item:hover .social-circle { transform: scale(1.1); }
        .social-item.wa:hover .social-circle { background: var(--whatsapp); }
        .social-item.ig:hover .social-circle { background: var(--instagram); }

        .social-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .newsletter { max-width: 400px; margin: 0 auto 80px; text-align: center; }
        .newsletter-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid #000;
            padding: 12px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; outline: none;
        }

        .stamped-footer {
            text-align: center; opacity: 0.6; font-size: 11px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; margin-top: 40px;
        }

        .copyright {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { max-width: 1000px; width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; padding: 40px; }
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 24px 0; }
        .size-btn {
            width: 44px; height: 44px; border: 1px solid #000; background: #fff;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .size-btn.active { background: #000; color: #fff; }

        @media (max-width: 768px) {
            header { padding: 16px 0; }
            .logo { font-size: 22px; }
            .logo-slogan { font-size: 11px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .section-padding { padding: 48px 0; }
            .social-links { gap: 32px; }
            .modal-content { grid-template-columns: 1fr; padding: 20px; }
        }

        .search-overlay {
            position: absolute; top: 100%; right: 0; width: 320px;
            background: #fff; border: 1px solid #f0f0f0; padding: 16px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-overlay.active { display: block; }
    </style>
<style>
    /* Sidebar Cart */
    .sidebar {
        position: fixed; top: 0; right: -100%; width: 400px; height: 100%;
        background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.05);

    .cart-item-details { font-size: 11px; color: #666; }

    .qty-btn { background: none; border: 1px solid #ddd; width: 24px; height: 24px; cursor: pointer; font-size: 14px; }
    .sidebar-footer { border-top: 1px solid #f0f0f0; padding-top: 24px; }
    .cart-total { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 24px; }

    /* Auth Modals */
    .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.98); z-index: 4000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content-auth { width: 100%; max-width: 400px; padding: 40px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #000; outline: none; font-family: inherit; }
    .btn-black { width: 100%; background: #000; color: #fff; border: none; padding: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; }
    .btn-black:hover { background: #EF4444; }

    /* Overlay */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 2500; display: none; }
    .overlay.active { display: block; }
</style>
</head>

    <script>
        const products = [
            {id:'t1', section:'arriba', category:'remeras', name:'VINTAGE TEE 01', price:25000, desc:'90s Cotton Blend. Oversized fit.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80', sizes:['S','M','L','XL']},
            {id:'t2', section:'arriba', category:'chombas', name:'RETRO POLO', price:32000, desc:'Piqué cotton. Hand-picked vintage.', img:'https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?auto=format&fit=crop&w=900&q=80', sizes:['M','L']},
            {id:'t3', section:'arriba', category:'casacas', name:'VARSITY JACKET', price:45000, desc:'Classic sports aesthetic.', img:'https://images.unsplash.com/photo-1551028719-00167b16eac5?auto=format&fit=crop&w=900&q=80', sizes:['L','XL']},
            {id:'p1', section:'abajo', category:'pantalones', name:'CARGO PANTS', price:56000, desc:'Heavy duty cotton. Multi-pocket.', img:'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?auto=format&fit=crop&w=900&q=80', sizes:['40','42','44']},
            {id:'p2', section:'abajo', category:'jeans', name:'BAGGY DENIM', price:54000, desc:'Y2K aesthetic. Loose fit.', img:'https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=900&q=80', sizes:['38','40','42']}
        ];

        let cart = JSON.parse(localStorage.getItem('zyskn_cart')) || [];
        let selectedSize = null;
        let currentSection = null;

        window.onload = () => {
            renderProducts(products);
            updateCartUI();
        };

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card" onclick="openModal('${p.id}')">
                    <div class="product-img-wrap">
                        <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
                        <div class="quick-add">QUICK ADD</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-price">$${p.price.toLocaleString('es-AR')}</p>
                    </div>
                </div>
            `).join('');
        }

        function showMainCategory(section, btn) {
            const wrapper = document.getElementById('sub-nav-wrapper');
            const allSubs = document.querySelectorAll('.sub-nav');
            
            // Toggle: Si presionas la misma sección que ya está abierta, se cierra.
            if (currentSection === section) {
                wrapper.classList.remove('show');
                allSubs.forEach(s => s.classList.remove('show'));
                currentSection = null;
                btn.classList.remove('active');
                return;
            }

            // Scroll suave si el usuario está muy abajo
            const threshold = window.innerHeight * 0.4;
            if (window.scrollY > threshold) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            
            if(section === 'all') {
                wrapper.classList.remove('show');
                renderProducts(products);
                currentSection = 'all';
                return;
            }

            // Cambio rápido entre secciones
            wrapper.classList.remove('show');
            allSubs.forEach(s => s.classList.remove('show'));

            setTimeout(() => {
                wrapper.classList.add('show');
                const target = document.getElementById(`sub-${section}`);
                target.classList.add('show');
                renderProducts(products.filter(p => p.section === section));
                currentSection = section;
            }, 50); // Delay mínimo para rapidez
        }

        function filterProducts(cat, btn) {
            renderProducts(products.filter(p => p.category === cat));
            const grid = document.getElementById('shop');
            if(window.scrollY > grid.offsetTop) {
                scrollToSection('shop');
            }
        }

        function toggleSearch() { document.getElementById('search-overlay').classList.toggle('active'); }
        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalName').textContent = p.name;
            document.getElementById('modalPrice').textContent = `$${p.price.toLocaleString('es-AR')}`;
            document.getElementById('modalDesc').textContent = p.desc;
            const sizeContainer = document.getElementById('modalSizes');
            sizeContainer.innerHTML = p.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>`).join('');
            document.getElementById('addToCartBtn').onclick = () => addToCart(p);
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function selectSize(s, btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = s;
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            selectedSize = null;
        }

        function addToCart(p) {
            if(!selectedSize) { alert('SELECT SIZE'); return; }
            cart.push({...p, size: selectedSize});
            localStorage.setItem('zyskn_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
        }

        function updateCartUI() { document.getElementById('cart-count').textContent = cart.length; }

        function scrollToSection(id) {
            const element = document.getElementById(id);
            if(!element) return;
            element.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleCart() { alert('CART: ' + cart.length + ' ITEMS.'); }
        function openAuthModal() { alert('LOGIN / REGISTER'); }
    </script>
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- Sidebar Cart -->
<div class="sidebar" id="cartSidebar">
    <div class="sidebar-header">
        <h2 style="text-transform:uppercase; letter-spacing:2px; font-size:18px;">Tu Carrito</h2>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-items" id="cart-items-container"></div>
    <div class="sidebar-footer">
        <div class="cart-total">
            <span>TOTAL</span>
            <span id="cart-total-price">$0</span>
        </div>
        <button class="btn-black" onclick="checkoutWhatsApp()">COMPRAR POR WHATSAPP</button>
    </div>
</div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
    <div class="modal-content-auth">
        <h2 style="text-transform:uppercase; letter-spacing:2px; margin-bottom:30px; text-align:center;">Iniciar Sesión</h2>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="loginPass" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn-black" onclick="handleLogin()">ENTRAR</button>
        <p style="text-align:center; font-size:11px; margin-top:20px; cursor:pointer;" onclick="openAuthModal('regModal')">¿NO TIENES CUENTA? REGÍSTRATE</p>
        <button class="btn-black" style="background:none; color:#000; border:1px solid #000; margin-top:10px;" onclick="closeAll()">CERRAR</button>
    </div>
</div>

<!-- Register Modal -->
<div class="modal" id="regModal">
    <div class="modal-content-auth">
        <h2 style="text-transform:uppercase; letter-spacing:2px; margin-bottom:30px; text-align:center;">Crear Cuenta</h2>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="regEmail" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="regPass" class="form-input">
        </div>
        <button class="btn-black" onclick="handleRegister()">REGISTRARME</button>
        <button class="btn-black" style="background:none; color:#000; border:1px solid #000; margin-top:10px;" onclick="closeAll()">CERRAR</button>
    </div>
</div>
<script>
    let cart = JSON.parse(localStorage.getItem('zyskn_cart')) || [];
    let currentUser = JSON.parse(localStorage.getItem('zyskn_user')) || null;

    // Lógica de Autenticación
    function checkAuth() {
        const authSection = document.getElementById('auth-section');
        if (currentUser) {
            authSection.innerHTML = `<span class="auth-text" style="color:green;">HOLA, ${currentUser.email.split('@')[0]}</span> <span onclick="logout()" style="font-size:9px; cursor:pointer; margin-left:10px;">(SALIR)</span>`;
        } else {
            authSection.innerHTML = `<span class="auth-text" onclick="openAuthModal('loginModal')">LOGIN / REGISTER</span>`;
        }
    }

    function openAuthModal(id = 'loginModal') {
        closeAll();
        document.getElementById(id).classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }

    function handleRegister() {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if (!email || !pass) return alert('Completa los campos');
        let users = JSON.parse(localStorage.getItem('zyskn_users_db')) || [];
        if (users.find(u => u.email === email)) return alert('El usuario ya existe');
        users.push({ email, pass });
        localStorage.setItem('zyskn_users_db', JSON.stringify(users));
        alert('Registro exitoso. Ahora inicia sesión.');
        openAuthModal('loginModal');
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        let users = JSON.parse(localStorage.getItem('zyskn_users_db')) || [];
        const user = users.find(u => u.email === email && u.pass === pass);
        if (user) {
            currentUser = user;
            localStorage.setItem('zyskn_user', JSON.stringify(user));
            closeAll();
            checkAuth();
        } else {
            alert('Credenciales incorrectas');
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('zyskn_user');
        checkAuth();
    }

    // Lógica de Carrito
    function addToCart(id) {
        const p = products.find(x => x.id === id);
        const talle = prompt("Elige talle (S, M, L, XL):", "M") || "M";
        const existing = cart.find(item => item.id === id && item.talle === talle);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...p, talle, qty: 1 });
        }
        saveCart();
        toggleCart(true);
    }

    function updateQty(index, delta) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        saveCart();
    }

    function saveCart() {
        localStorage.setItem('zyskn_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const count = document.getElementById('cart-count');
        const totalDisplay = document.getElementById('cart-total-price');
        
        count.textContent = cart.reduce((acc, item) => acc + item.qty, 0);
        let total = 0;

        container.innerHTML = cart.map((item, index) => {
            total += item.price * item.qty;
            return `
                <div class="cart-item">
                    <img src="${item.img}" class="cart-item-img">
                    <div class="cart-item-info">
                        <p class="cart-item-name">${item.name}</p>
                        <p class="cart-item-details">TALLE: ${item.talle} | $${item.price.toLocaleString()}</p>
                        <div class="cart-qty-control">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        totalDisplay.textContent = `$${total.toLocaleString()}`;
    }

    function toggleCart(forceOpen = false) {
        const s = document.getElementById('cartSidebar');
        const o = document.getElementById('overlay');
        if (forceOpen) { s.classList.add('active'); o.classList.add('active'); }
        else { s.classList.toggle('active'); o.classList.toggle('active'); }
    }

    function checkoutWhatsApp() {
        if (cart.length === 0) return alert('Tu carrito está vacío');
        let msg = "ZYSKN ★ - NUEVO PEDIDO\n\n";
        let total = 0;
        cart.forEach((item, i) => {
            const sub = item.price * item.qty;
            msg += `${i+1}. ${item.name}\n   Talle: ${item.talle} | Cant: ${item.qty}\n   Subtotal: $${sub.toLocaleString()}\n\n`;
            total += sub;
        });
        msg += `TOTAL A PAGAR: $${total.toLocaleString()}\n\n`;
        msg += "Cliente: " + (currentUser ? currentUser.email : "Invitado");
        
        const encoded = encodeURIComponent(msg);
        window.open(`https://wa.me/5493544631553?text=${encoded}`, '_blank');
    }

    function closeAll() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        document.getElementById('cartSidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }
</script>
</body>
</html>
