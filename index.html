      display: block;
      width: 100%;
      text-align: left;

      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 100%;
      background: #000;
      transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);

      color: #000;
      font-weight: 700;

    .sub-nav-item:hover::before {
      width: 4px;
    }

    .nav-item:hover .sub-nav-item {
      opacity: 1;
      transform: translateY(0);
    }
    .nav-item:hover .sub-nav-item:nth-child(1) { transition-delay: 0.08s; }

    .nav-item:hover .sub-nav-item:nth-child(8) { transition-delay: 0.22s; }

          <h3 style="font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem;">¿QUÉ ES ROPA AMERICANA?</h3>
          <p style="font-size: 0.9rem; color: var(--text-muted);">Archive pieces de origen estadounidense. Trabajamos con lotes cerrados y colecciones privadas de Estados Unidos. Cada prenda es inspeccionada y autenticada individualmente. Vintage curado con estándares de galería: solo conservamos piezas que mantengan su integridad y valor cultural.</p>
        </div>

        <div style="margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
          <h3 style="font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem;">¿HAY CAMBIOS O DEVOLUCIONES?</h3>
          <p style="font-size: 0.9rem; color: var(--text-muted);">No. Todas las piezas son únicas sin restock. Te recomendamos revisar detalladamente el estado especificado debajo de cada producto antes de comprar. Consultá con nosotros si tenés dudas sobre una prenda específica.</p>
        </div>

        <div style="margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
          <h3 style="font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem;">¿CUÁLES SON LOS MÉTODOS DE PAGO?</h3>
          <p style="font-size: 0.9rem; color: var(--text-muted);">Aceptamos transferencia bancaria o efectivo. No procesamos pagos con tarjeta de crédito o débito.</p>
        </div>

  <script>
    const products = [
      {id:'t1', section:'arriba', category:'remeras', name:'VINTAGE TEE 01', price:25000, desc:'Remera 90s Cotton Blend. Estado 9/10.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['S','M','L'], isNew: true},
      {id:'t2', section:'arriba', category:'chombas', name:'RETRO POLO NAVY', price:32000, desc:'Polo Lacoste vintage original.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['M','L'], isNew: true},
      {id:'t3', section:'arriba', category:'hoodies', name:'CHAMPION HOODIE', price:45000, desc:'Hoodie heavyweight Champion.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['L','XL']},
      {id:'t4', section:'arriba', category:'camisas', name:'FLANNEL SHIRT', price:28000, desc:'Camisa de franela a cuadros.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['M','L','XL']},
      {id:'b1', section:'abajo', category:'pantalones', name:'CARGO PANTS KHAKI', price:38000, desc:'Pantalón cargo vintage.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['30','32','34'], isNew: true},
      {id:'b2', section:'abajo', category:'jeans', name:'LEVIS 501 DENIM', price:42000, desc:'Levis 501 clásicos.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['32','34','36']},
      {id:'b3', section:'abajo', category:'bermudas', name:'CHINO SHORTS', price:22000, desc:'Bermudas tipo chino.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80', sizes:['30','32']}
    ];

    let cart = JSON.parse(localStorage.getItem('zyskn_cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('zyskn_wishlist')) || [];
    let viewedProducts = JSON.parse(localStorage.getItem('zyskn_viewed')) || [];
    let appliedCoupon = JSON.parse(localStorage.getItem('zyskn_coupon')) || null;
    let currentProduct = null;
    let selectedSize = null;

    const coupons = {
      'ZYSKN10': { type: 'percent', value: 10, name: 'ZYSKN10 - 10% OFF' },
      'ENVIOGRATIS': { type: 'shipping', value: 3000, min: 50000, name: 'ENVÍO GRATIS' }
    };

    function init() {
      renderProducts(products, 'productsGrid');
      renderProducts(products.filter(p=>p.isNew), 'nuevoProductsGrid');
      renderRecentlyViewed();
      setupScrollListener();
      updateCartUI();
      updateWishlistUI();
      if(appliedCoupon) showCouponApplied();
    }

    function saveCart() {
      localStorage.setItem('zyskn_cart', JSON.stringify(cart));
    }

    function saveWishlist() {
      localStorage.setItem('zyskn_wishlist', JSON.stringify(wishlist));
    }

    function saveViewed() {
      localStorage.setItem('zyskn_viewed', JSON.stringify(viewedProducts));
    }

    function toggleSearch() {
      const header = document.getElementById('header');
      const input = document.getElementById('searchInput');
      header.classList.toggle('searching');
      if(header.classList.contains('searching')) {
        setTimeout(() => input.focus(), 100);
      }
    }

    function handleSearch(e) {
      if(e.key === 'Enter') {
        const query = e.target.value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
        renderProducts(filtered, 'productsGrid');
        scrollToSection('shop');
        toggleSearch();
        e.target.value = '';
      }
    }
      const n = document.getElementById('notification');
      n.textContent = msg; n.style.display = 'block';
      setTimeout(() => { n.style.display = 'none'; }, 3000);
    }

    function handleAuth(type) {
      if(type === 'login') {
        const email = document.getElementById('loginEmail').value;
        if(!email) { alert('Ingresa tu email'); return; }
        document.getElementById('userAuth').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> MI PERFIL';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('profileView').style.display = 'block';
        document.getElementById('userDisplay').textContent = `SESIÓN INICIADA COMO: ${email.toUpperCase()}`;
        showNotification('Sesión iniciada correctamente');
      } else if(type === 'register') {
        const name = document.getElementById('regName').value;
        if(!name) { alert('Ingresa tu nombre'); return; }
        document.getElementById('userAuth').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> MI PERFIL';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('profileView').style.display = 'block';
        document.getElementById('userDisplay').textContent = `CUENTA CREADA: ${name.toUpperCase()}`;
        showNotification('Cuenta creada con éxito');
      } else if(type === 'logout') {
        document.getElementById('userAuth').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> LOGIN';
        document.getElementById('profileView').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        showNotification('Sesión cerrada');
      }
    }

    function renderProducts(list, gridId) {
      const grid = document.getElementById(gridId);
      if(!grid) return;
      grid.innerHTML = list.map(p => `
        <div class="product-card">
          <div class="product-image" onclick="showProductDetail('${p.id}')">
            <img src="${p.img}" alt="${p.name}">
            <button class="wishlist-btn ${wishlist.includes(p.id)? 'active' : ''}" onclick="event.stopPropagation(); toggleWishlist('${p.id}')">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:flex-start;" onclick="showProductDetail('${p.id}')">
            <div>
              <h3 style="font-size:0.85rem; font-weight:900; text-transform:uppercase;">${p.name}</h3>
              <p style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase;">${p.category}</p>
            </div>
            <p style="font-size:0.85rem; font-weight:700;">$${p.price.toLocaleString('es-AR')}</p>
          </div>
        </div>
      `).join('');
    }

    function showMainCategory(s, e) {
      if(e) e.preventDefault();
      renderProducts(s==='todo'?products:products.filter(p=>p.section===s), 'productsGrid');
      scrollToSection('shop');
    }

    function filterProducts(c) {
      renderProducts(products.filter(p=>p.category===c), 'productsGrid');
      scrollToSection('shop');
    }

    function showProductDetail(id) {
      currentProduct = products.find(p=>p.id===id);
      selectedSize = null;

      // Guardar en vistos recientes
      if(!viewedProducts.includes(id)) {
        viewedProducts.unshift(id);
        if(viewedProducts.length > 4) viewedProducts.pop();
        saveViewed();
        renderRecentlyViewed();
      }

      document.getElementById('detailName').textContent = currentProduct.name;
      document.getElementById('detailPrice').textContent = `$${currentProduct.price.toLocaleString('es-AR')}`;
      document.getElementById('detailDesc').textContent = currentProduct.desc;
      document.getElementById('detailImage').src = currentProduct.img;
      document.getElementById('detailSizes').innerHTML = currentProduct.sizes.map(s=>`
        <button onclick="setS('${s}', this)" style="padding:0.8rem 1.5rem; border:1px solid #000; background:#fff; cursor:pointer; font-size:0.8rem; font-weight:700;">${s}</button>
      `).join('');
      document.getElementById('product-detail').classList.add('active');
      scrollToSection('product-detail');
    }

    function renderRecentlyViewed() {
      const section = document.getElementById('recently-viewed');
      const grid = document.getElementById('recentlyViewedGrid');
      if(viewedProducts.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      const viewedItems = viewedProducts.map(id => products.find(p => p.id === id)).filter(Boolean);
      renderProducts(viewedItems, 'recentlyViewedGrid');
    }

    function setS(s, btn) {
      selectedSize = s;
      document.querySelectorAll('#detailSizes button').forEach(b=>b.style.background='#fff');
      btn.style.background = '#eee';
    }

    function addToCartFromDetail() {
      if(!selectedSize){alert('Selecciona talle'); return;}
      const existingItem = cart.find(i => i.id === currentProduct.id && i.size === selectedSize);
      if(existingItem) {
        existingItem.qty = (existingItem.qty || 1) + 1;
      } else {
        cart.push({...currentProduct, size:selectedSize, qty: 1});
      }
      saveCart();
      updateCartUI();
      showNotification('Producto añadido al carrito');
      scrollToSection('cart-section');
    }

    function toggleWishlist(productId) {
      const index = wishlist.indexOf(productId);
      if(index > -1) {
        wishlist.splice(index, 1);
        showNotification('Eliminado de favoritos');
      } else {
        wishlist.push(productId);
        showNotification('Agregado a favoritos');
      }
      saveWishlist();
      updateWishlistUI();
      renderProducts(products, 'productsGrid');
      renderProducts(products.filter(p=>p.isNew), 'nuevoProductsGrid');
      renderRecentlyViewed();
    }

    function updateWishlistUI() {
      const badge = document.getElementById('wishlistBadge');
      badge.textContent = wishlist.length;
      if(wishlist.length > 0) {
        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }
    }

    function openWishlist() {
      const modal = document.getElementById('wishlistModal');
      const itemsContainer = document.getElementById('wishlistItems');
      const emptyMsg = document.getElementById('wishlistEmpty');

      if(wishlist.length === 0) {
        itemsContainer.innerHTML = '';
        emptyMsg.style.display = 'block';
      } else {
        emptyMsg.style.display = 'none';
        const wishlistProducts = wishlist.map(id => products.find(p => p.id === id)).filter(Boolean);
        itemsContainer.innerHTML = wishlistProducts.map(p => `
          <div style="display:flex; gap:1rem; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid #eee;">
            <img src="${p.img}" alt="${p.name}" style="width:80px; height:100px; object-fit:cover;">
            <div style="flex:1; text-align:left;">
              <h3 style="font-size:0.9rem; font-weight:900; text-transform:uppercase; margin-bottom:0.3rem;">${p.name}</h3>
              <p style="font-size:0.85rem; font-weight:700; margin-bottom:0.8rem;">$${p.price.toLocaleString('es-AR')}</p>
              <button class="btn" onclick="addWishlistToCart('${p.id}')" style="background:#000; color:#fff; padding:0.5rem 1rem; font-size:0.75rem; margin-top:0;">AGREGAR AL CARRITO</button>
            </div>
            <button onclick="toggleWishlist('${p.id}')" style="background:none; border:none; font-size:1.5rem; cursor:pointer; align-self:flex-start;">×</button>
          </div>
        `).join('');
      }
      modal.classList.add('show');
    }

    function closeWishlist() {
      document.getElementById('wishlistModal').classList.remove('show');
    }

    function addWishlistToCart(productId) {
      const product = products.find(p => p.id === productId);
      if(product) {
        currentProduct = product;
        selectedSize = product.sizes[0];
        addToCartFromDetail();
        closeWishlist();
      }
    }

    function applyCoupon() {
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      if(!code) {
        alert('Ingresá un código');
        return;
      }

      const coupon = coupons[code];
      if(!coupon) {
        alert('Código inválido');
        return;
      }

      const subtotal = cart.reduce((s,i)=>s+(i.price * (i.qty || 1)),0);

      if(coupon.min && subtotal < coupon.min) {
        alert(`Este cupón requiere compra mínima de $${coupon.min.toLocaleString('es-AR')}`);
        return;
      }

      appliedCoupon = {code,...coupon};
      localStorage.setItem('zyskn_coupon', JSON.stringify(appliedCoupon));
      showCouponApplied();
      updateCartUI();
      showNotification('Cupón aplicado');
    }

    function showCouponApplied() {
      const div = document.getElementById('couponApplied');
      div.textContent = `✓ ${appliedCoupon.name} APLICADO`;
      div.classList.add('show');
      document.getElementById('couponInput').value = '';
    }

    function removeCoupon() {
      appliedCoupon = null;
      localStorage.removeItem('zyskn_coupon');
      document.getElementById('couponApplied').classList.remove('show');
      updateCartUI();
    }

    function calculateTotal() {
      const subtotal = cart.reduce((s,i)=>s+(i.price * (i.qty || 1)),0);
      let discount = 0;

      if(appliedCoupon) {
        if(appliedCoupon.type === 'percent') {
          discount = subtotal * (appliedCoupon.value / 100);
        } else if(appliedCoupon.type === 'shipping') {
          discount = appliedCoupon.value;
        }
      }

      return { subtotal, discount, total: subtotal - discount };
    }

    function updateCartUI() {
      const badge = document.getElementById('cartBadge');
      const totalItems = cart.reduce((sum, i) => sum + (i.qty || 1), 0);
      badge.textContent = totalItems;
      if(totalItems > 0) {
        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }

      const checkoutArea = document.getElementById('cartCheckoutArea');
      const emptyMsg = document.getElementById('cartEmptyMsg');

      if(cart.length === 0) {
        checkoutArea.style.display = 'none';
        emptyMsg.style.display = 'block';
        document.getElementById('cartItems').innerHTML = '';
      } else {
        checkoutArea.style.display = 'block';
        emptyMsg.style.display = 'none';
        document.getElementById('cartItems').innerHTML = cart.map((i, index)=>`
          <div style="margin-bottom:1rem; font-size:0.9rem; border-bottom:1px solid #eee; padding-bottom:1rem; display:flex; justify-content:space-between; align-items:center">
            <div style="flex:1;">
              <span style="font-weight:600;">${i.name} (${i.size})</span>
              <div style="display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem;">
                <button onclick="updateCartQty(${index}, -1)" style="background:#000; color:#fff; border:none; width:24px; height:24px; cursor:pointer; font-weight:700;">-</button>
                <span style="min-width:30px; text-align:center;">${i.qty || 1}</span>
                <button onclick="updateCartQty(${index}, 1)" style="background:#000; color:#fff; border:none; width:24px; height:24px; cursor:pointer; font-weight:700;">+</button>
                <span style="margin-left:auto; font-weight:700;">$${(i.price * (i.qty || 1)).toLocaleString('es-AR')}</span>
              </div>
            </div>
            <button onclick="removeFromCart(${index})" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:900; font-size:1.2rem; padding:0 10px; margin-left:1rem;">✕</button>
          </div>
        `).join('');
      }

      const { subtotal, discount, total } = calculateTotal();
      document.getElementById('cartSubtotal').textContent = `$${subtotal.toLocaleString('es-AR')}`;
      document.getElementById('cartTotal').textContent = `$${total.toLocaleString('es-AR')}`;
    }

    function updateCartQty(index, change) {
      cart[index].qty = (cart[index].qty || 1) + change;
      if(cart[index].qty <= 0) {
        cart.splice(index, 1);
      }
      saveCart();
      updateCartUI();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
      updateCartUI();
      showNotification('Producto eliminado');
    }
    function toggleAuthView(type) {
      document.getElementById('loginForm').style.display = type === 'login'? 'block' : 'none';
      document.getElementById('registerForm').style.display = type === 'register'? 'block' : 'none';
    }

    function shareOnWhatsApp() {
      if (cart.length === 0) {
        alert('El carrito está vacío');
        return;
      }

      const nombre = document.getElementById('orderName').value.trim();
      const localidad = document.getElementById('orderLocation').value.trim();
      const email = document.getElementById('orderEmail').value.trim();
      const sucursal = document.getElementById('orderShippingAddr').value.trim();
      const dni = document.getElementById('orderDni').value.trim();
      const celular = document.getElementById('orderPhone').value.trim();

      if (!nombre ||!localidad ||!dni ||!celular) {
        alert('Completá Nombre, Ciudad, DNI y Celular');
        return;
      }

      const now = new Date();
      const fecha = now.toLocaleDateString('es-AR');
      const hora = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

      let t = `Holaa! ZYSKN ★, Te envío mi nuevo pedido!.%0A`;
      t += `Fecha: ${fecha} | Hora: ${hora}%0A%0A`;
      t += `*DATOS DEL CLIENTE:*%0A`;
      t += `- Nombre: ${nombre}%0A`;
      t += `- DNI: ${dni}%0A`;
      t += `- Celular: ${celular}%0A`;
      t += `- Correo: ${email || 'No informado'}%0A`;
      t += `- Ubicación: ${localidad}%0A`;
      t += `- Sucursal Correo: ${sucursal || 'Coordinar'}%0A%0A`;
      t += `*PRODUCTOS:*%0A`;

      const { subtotal, discount, total } = calculateTotal();
      cart.forEach(i => {
        const qty = i.qty || 1;
        const price = Number(i.price) || 0;
        const subtotalProd = price * qty;
        const nombreProd = i.name || i.title || 'Producto';
        const talle = i.size || i.talle || '';

        t += `• ${nombreProd} ${talle? `(Talle ${talle})` : ''} x${qty} - $${subtotalProd.toLocaleString('es-AR')}%0A`;
      });

      if(appliedCoupon) {
        t += `%0A*Cupón aplicado:* ${appliedCoupon.name}%0A`;
        t += `*Descuento:* -$${discount.toLocaleString('es-AR')}%0A`;
      }

      t += `%0A*TOTAL: $${total.toLocaleString('es-AR')}*%0A`;

      window.open(`https://wa.me/5493544631553?text=${t}`, '_blank');
    }

    function setupScrollListener() {
      window.addEventListener('scroll', () => {
        const h=document.getElementById('header');
        if(window.scrollY>50) h.classList.add('scrolled');
        else h.classList.remove('scrolled');
      });
    }

    function scrollToSection(id) {
      const el = document.getElementById(id);
      const headerOffset = document.getElementById('header').offsetHeight;
      const elementPosition = el.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
      window.scrollTo({ top: offsetPosition, behavior: "smooth" });
    }

    function scrollToTop() { window.scrollTo({top:0, behavior:'smooth'}); }

    const hamburger = document.getElementById('hamburger');
    const navMain = document.getElementById('navMain');
    const navOverlay = document.getElementById('nav-overlay');
    const navLinks = document.querySelectorAll('.nav-item a,.sub-nav-item');

    if(hamburger && navMain) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navMain.classList.toggle('active');
        if(navOverlay) navOverlay.classList.toggle('active');
        document.body.style.overflow = navMain.classList.contains('active')? 'hidden' : '';
      });
    }

    if(navOverlay) {
      navOverlay.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navMain.classList.remove('active');
        navOverlay.classList.remove('active');
        document.body.style.overflow = '';
      });
    }

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navMain.classList.remove('active');
        if(navOverlay) navOverlay.classList.remove('active');
        document.body.style.overflow = '';
      });
    });

    // Cerrar modal al hacer click afuera
    document.getElementById('wishlistModal').addEventListener('click', (e) => {
      if(e.target.id === 'wishlistModal') closeWishlist();
    });

    init();
  </script>
</body>
</html>
